<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Capy-POS</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirects all 404s to index.html for Angular routing
      var pathSegmentsToKeep = 1; // Keep /capy-pos/ prefix
      var l = globalThis.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replaceAll('&', '~and~') +
          (l.search ? '&' + l.search.slice(1).replaceAll('&', '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
