<div class="flex flex-col h-[calc(100vh-64px)] md:h-screen bg-gray-50" data-testid="pos-terminal">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 shadow-sm z-10 flex-shrink-0">
    <div class="flex justify-between items-center px-4 py-3 md:px-6 md:py-4 max-w-[1920px] mx-auto">
      <h1
        class="text-lg md:text-2xl font-bold m-0 text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-600"
      >
        POS Terminal
      </h1>
      <div class="flex gap-2 md:gap-3">
        <button
          class="flex items-center gap-1.5 px-3 py-2.5 md:px-5 md:py-2.5 bg-gradient-to-r from-indigo-600 to-purple-700 text-white border-none rounded-lg text-xs md:text-sm font-semibold cursor-pointer transition-all duration-200 min-h-[44px] hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0"
          data-testid="add-product-btn"
          (click)="handleAddProduct()"
          aria-label="Add product"
        >
          <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 6v6m0 0v6m0-6h6m-6 0H6"
            />
          </svg>
          <span class="hidden sm:inline">Add Product</span>
        </button>
        <button
          class="flex items-center gap-1.5 px-3 py-2.5 md:px-5 md:py-2.5 bg-gradient-to-r from-indigo-600 to-purple-700 text-white border-none rounded-lg text-xs md:text-sm font-semibold cursor-pointer transition-all duration-200 min-h-[44px] hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0"
          data-testid="new-transaction-btn"
          (click)="startNewTransaction()"
          aria-label="Start new transaction"
        >
          <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            />
          </svg>
          <span class="hidden sm:inline">New Transaction</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content: stacked on mobile, side-by-side on desktop -->
  <main class="flex-1 flex flex-col lg:flex-row lg:gap-4 p-3 md:p-4 lg:p-6 overflow-hidden">
    <!-- Product Search Section -->
    <section class="flex-1 min-h-0 overflow-auto" data-testid="search-section">
      <app-product-search (productSelected)="handleProductSelected($event)"> </app-product-search>
    </section>

    <!-- Shopping Cart Section -->
    <aside
      class="hidden lg:flex lg:w-[380px] xl:w-[420px] lg:flex-shrink-0"
      data-testid="cart-section"
    >
      <app-shopping-cart (checkoutRequested)="openCheckout()" class="w-full"> </app-shopping-cart>
    </aside>
  </main>

  <!-- Mobile Cart FAB (visible on < lg when cart has items) -->
  <button
    class="fixed right-4 bottom-20 z-40 w-14 h-14 rounded-full bg-gradient-to-r from-indigo-600 to-purple-700 text-white border-none shadow-xl cursor-pointer flex items-center justify-center text-2xl transition-transform duration-200 active:scale-95 lg:hidden"
    (click)="toggleMobileCart()"
    [attr.aria-label]="'Open cart, ' + posFacade.totalItems() + ' items'"
    data-testid="mobile-cart-fab"
  >
    🛒
    <!-- Item count badge -->
    @if (posFacade.totalItems() > 0) {
      <span
        class="absolute -top-1 -right-1 min-w-[22px] h-[22px] px-1 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center shadow-md animate-bounce"
        data-testid="cart-badge"
      >
        {{ posFacade.totalItems() }}
      </span>
    }
  </button>

  <!-- Mobile Cart Bottom Sheet -->
  @if (mobileCartOpen()) {
    <dialog
      open
      class="fixed inset-0 z-50 lg:hidden m-0 p-0 border-none bg-transparent w-full h-full max-w-none max-h-none"
      aria-label="Shopping cart"
    >
      <!-- Backdrop -->
      <div
        class="absolute inset-0 bg-black/50"
        (click)="closeMobileCart()"
        (keydown.escape)="closeMobileCart()"
        aria-hidden="true"
      ></div>
      <!-- Cart Panel (slides up from bottom) -->
      <div
        class="absolute bottom-0 inset-x-0 max-h-[85vh] bg-white rounded-t-2xl shadow-2xl flex flex-col animate-slide-up overflow-hidden"
      >
        <!-- Drag handle -->
        <div class="flex justify-center pt-3 pb-2 flex-shrink-0">
          <div class="w-10 h-1 bg-gray-300 rounded-full"></div>
        </div>
        <!-- Close button -->
        <button
          class="absolute top-3 right-4 w-8 h-8 rounded-full bg-gray-100 border-none cursor-pointer flex items-center justify-center text-gray-500 hover:bg-gray-200 min-w-[44px] min-h-[44px]"
          (click)="closeMobileCart()"
          aria-label="Close cart"
        >
          ✕
        </button>
        <!-- Cart content -->
        <div class="flex-1 overflow-auto px-4 pb-4">
          <app-shopping-cart (checkoutRequested)="openCheckout()"> </app-shopping-cart>
        </div>
      </div>
    </dialog>
  }

  <!-- Checkout Overlay -->
  @if (showCheckout()) {
    <app-checkout
      (paymentComplete)="handlePaymentComplete($event)"
      (checkoutCancelled)="closeCheckout()"
    />
  }

  <!-- Receipt Overlay -->
  @if (showReceipt() && receiptData()) {
    <app-receipt
      [data]="receiptData()!"
      (printReceipt)="handlePrintReceipt()"
      (newTransaction)="handleNewTransactionFromReceipt()"
    />
  }
</div>
