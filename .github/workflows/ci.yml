name: CI

# PR gates for main. The fast, deterministic checks (lint, unit tests +coverage,
# tooling tests, production build) run first and in parallel; the slower affected
# Playwright e2e job runs only after all of them pass (needs: [lint, test, build]),
# so a fast-check failure short-circuits the ~7-min e2e run.
# (deploy lives in deploy-pages.yml on push to main.)
on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  ANGULAR_BUILD_CONFIG: 'production'
  BASE_HREF: '/capy-pos-public/'

jobs:
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check

  test:
    name: 🧪 Unit & Tooling Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts
      - name: Unit tests (+coverage gate)
        run: npm run test:unit -- --coverage
      - name: GraphRAG tooling tests
        run: npm run test:graphrag
      - name: Upload coverage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts
      - name: Cache Angular build
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-angular-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-angular-
      - name: Build (production)
        run: npx ng build --configuration=${{ env.ANGULAR_BUILD_CONFIG }} --base-href ${{ env.BASE_HREF }}
      - name: Verify build output
        run: test -d ./dist/capy-pos/browser && echo "✅ build output present"

  e2e:
    name: 🎭 Affected Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Gate the slow e2e behind the fast checks: skip it entirely when lint, unit,
    # or build fail, instead of burning ~7 min in parallel on a PR that can't merge.
    # Runs the SAME affected-spec selection as the husky pre-push hook
    # (scripts/affected-e2e.mjs): only specs impacted by the PR's changed files,
    # escalating to the full suite on core/config changes.
    needs: [lint, test, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the affected runner can diff against the base branch.
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Ensure base ref is available
        run: git fetch --no-tags origin ${{ github.base_ref }}
      - name: Run affected e2e
        # Mirrors the pre-push hook; diffs against the PR base branch.
        env:
          AFFECTED_BASE: origin/${{ github.base_ref }}
          PLAYWRIGHT_PROJECT: chromium
        run: node scripts/affected-e2e.mjs
      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  smoke:
    name: 🔥 Production route smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # ALWAYS runs — deliberately NOT gated by affected-spec selection. A page
    # broken by a change usually isn't "affected" by that change's files, and
    # prod-only bugs (e.g. `process.env` in environment.prod.ts, which threw
    # "process is not defined" and broke every page) never surface in the
    # dev-server e2e. This serves the PRODUCTION build and asserts every
    # top-level route renders without a runtime error.
    needs: [lint, test, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Route smoke against the production build
        run: npm run test:e2e:smoke
      - name: Upload smoke report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7
