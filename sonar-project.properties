# SonarQube Configuration for Capy-POS

# Project identification
sonar.organization=freshmanna-soft
sonar.projectKey=freshmanna-soft_capy-pos-public
sonar.projectName=capy-pos-public
sonar.projectVersion=0.0.0

# Source code location
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,tests/**/*
sonar.sourceEncoding=UTF-8

# Language and parser configuration
sonar.language=ts
# Note: sonar.typescript.lcov.reportPaths is deprecated.
# Use sonar.javascript.lcov.reportPaths for both JS and TS coverage.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/*.spec.ts,**/*.test.ts,**/node_modules/**,**/dist/**,coverage/**,.angular/**,build/**
sonar.test.exclusions=node_modules/**

# Code coverage
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/node_modules/**

# Code duplication
sonar.cpd.exclusions=**/*.spec.ts,**/*.test.ts

# Angular-specific configuration
sonar.typescript.tsconfigPath=tsconfig.json

# TypeScript-specific configuration
sonar.typescript.internal.typeScriptVersion=5.9.2

# Security rules
sonar.security.hotspots.enabled=true

# Code smell threshold
sonar.javascript.exclusions=**/node_modules/**

# Performance and quality
sonar.core.codeCoveragePlugin=cobertura
sonar.links.homepage=https://github.com/freshmanna-soft/capy-pos-public
sonar.links.scm=https://github.com/freshmanna-soft/capy-pos-public
sonar.links.ci=https://github.com/freshmanna-soft/capy-pos-public/actions

# Import of external quality profiles
sonar.import_unknown_properties=true
